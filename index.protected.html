<title>個人用ダッシュボード</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f23; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.gate { width: 100%; max-width: 360px; padding: 32px 24px; text-align: center; }
.gate h1 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
.gate .sub { font-size: 0.8rem; color: #8888aa; margin-bottom: 28px; }
.gate input { width: 100%; padding: 12px 16px; background: #1a1a3e; border: 1px solid #2a2a5a; border-radius: 8px; color: #e0e0e0; font-size: 1rem; text-align: center; letter-spacing: 4px; margin-bottom: 12px; outline: none; }
.gate input:focus { border-color: #e60012; }
.gate button { width: 100%; padding: 12px; background: #e60012; border: none; border-radius: 8px; color: #fff; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
.gate button:hover { opacity: 0.85; }
.gate button:disabled { opacity: 0.5; cursor: default; }
.gate .err { font-size: 0.8rem; color: #ff1744; margin-top: 10px; height: 1.2em; }
</style>
</head>

async function decrypt(password) {
  const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const salt = b64(ENC_DATA.salt);
  const ct = b64(ENC_DATA.ct);
  const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits']);
  const keyBits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt, iterations: ENC_DATA.iterations, hash: 'SHA-256' }, keyMaterial, 256);
  const key = new Uint8Array(keyBits);
  const hmacKey = await crypto.subtle.importKey('raw', key, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
  const keystream = new Uint8Array(ct.length);
  let offset = 0, counter = 0;
  while (offset < ct.length) {
    const ctrBuf = new Uint8Array(4);
    new DataView(ctrBuf.buffer).setUint32(0, counter, false);
    const block = new Uint8Array(await crypto.subtle.sign('HMAC', hmacKey, ctrBuf));
    const chunk = Math.min(32, ct.length - offset);
    keystream.set(block.subarray(0, chunk), offset);
    offset += chunk;
    counter++;
  }
  const plaintext = ct.map((b, i) => b ^ keystream[i]);
  return new TextDecoder().decode(plaintext);
}
async function handleUnlock() {
  const pw = document.getElementById('pw-input').value;
  const btn = document.getElementById('pw-btn');
  const err = document.getElementById('pw-err');
  if (!pw) return;
  btn.disabled = true;
  btn.textContent = '復号中...';
  err.textContent = '';
  try {
    const html = await decrypt(pw);
    if (!html.includes('<!DOCTYPE') && !html.includes('<html')) throw new Error('bad password');
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    err.textContent = '⚠ パスワードが違います';
    btn.disabled = false;
    btn.textContent = '開く';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') handleUnlock(); });
